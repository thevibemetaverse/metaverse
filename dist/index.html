      position: fixed !important;

    /* Mobile-specific styles */
    @media (max-width: 800px) {
      .emoji-reactions {
        bottom: 200px !important; /* Higher position on mobile to avoid controls */
        padding: 6px 10px !important;

      .emoji-button {
        width: 40px !important;
        height: 40px !important;
        font-size: 24px !important;
      }

  </style>
  <script type="module" crossorigin src="/assets/index-D6VSxoeN.js"></script>
</head>
<body>
  <div id="ui-container">
    <!-- UI elements will be added here -->
    <div class="emoji-reactions" style="position: fixed !important; bottom: 20px !important; z-index: 9999999 !important;">
      <button class="emoji-button" onclick="showEmojiReaction('👋')">👋</button>
      <button class="emoji-button" onclick="showEmojiReaction('👍')">👍</button>
      <button class="emoji-button" onclick="showEmojiReaction('❤️')">❤️</button>
      <button class="emoji-button" onclick="showEmojiReaction('😂')">😂</button>
      <button class="emoji-button" onclick="showEmojiReaction('🎉')">🎉</button>
    </div>
  </div>

  <button id="settings-button">⚙️</button>
  <div id="settings-panel">
    <h3>Settings</h3>
    <div>
      <label for="volume">Volume: </label>
      <input type="range" id="volume" min="0" max="100" value="50">
    </div>
    <div>
      <label for="graphics">Graphics Quality: </label>
      <select id="graphics">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
    </div>
    <div>
      <label for="camera-view">Camera View: </label>
      <select id="camera-view">
        <option value="first-person">First Person</option>
        <option value="third-person" selected>Third Person</option>
      </select>
    </div>
    <button id="close-settings">Close</button>
  </div>

  <!-- Control instructions panel -->
  <div id="controls-help" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 10px; color: white; text-align: center; font-family: Arial, sans-serif; max-width: 400px; z-index: 1000;">
    <h2>Controls</h2>
    <div style="text-align: left; margin: 10px 0;">
      <p><strong>WASD or Arrow Keys:</strong> Move</p>
      <p><strong>Q/E:</strong> Rotate left/right</p>
      <p><strong>Mouse Drag:</strong> Rotate by dragging</p>
      <p><strong>Space:</strong> Jump</p>
      <p><strong>R/F:</strong> Adjust camera height</p>
      <p><strong>Z/X:</strong> Zoom camera in/out</p>
    </div>
    <button id="close-controls-help" style="padding: 8px 16px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer;">Got it!</button>
  </div>

  <!-- Debug controls -->
  <div id="debug-panel" style="position: absolute; bottom: 10px; right: 10px; background-color: rgba(0, 0, 0, 0.7); padding: 10px; border-radius: 5px; color: white; display: none;">
    <h3>Debug Controls</h3>
    <button id="reload-model">Reload Zuckerberg Model</button>
    <button id="reset-model">Reset to Fixed Settings</button>
    <div>
      <label for="model-scale">Scale:</label>
      <input type="range" id="model-scale" min="0.1" max="5" step="0.1" value="0.6">
      <span id="scale-value">0.6</span>
    </div>
    <div>
      <label for="model-y-pos">Y Position:</label>
      <input type="range" id="model-y-pos" min="-5" max="5" step="0.1" value="0.0">
      <span id="y-pos-value">0.0</span>
    </div>
    <div>
      <label for="model-rotation">Rotation:</label>
      <input type="range" id="model-rotation" min="0" max="6.28" step="0.1" value="3.14">
      <span id="rotation-value">3.14</span>
    </div>
    <div>
      <label for="model-vertical-scale">Vertical Scale:</label>
      <input type="range" id="model-vertical-scale" min="0.1" max="5" step="0.1" value="1.0">
      <span id="vertical-scale-value">1.0</span>
    </div>
    <button id="toggle-debug">Toggle Debug Visuals</button>
    <button id="toggle-npcs">Toggle NPCs</button>
  </div>

  <button id="show-debug" style="position: absolute; bottom: 10px; right: 10px; padding: 5px; background-color: rgba(255, 0, 0, 0.7); color: white; border: none; border-radius: 5px;">Debug</button>

  <!-- Emergency Emoji Bar Button -->
  <button id="show-emoji-bar" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); padding: 8px 16px; background-color: #0066ff; color: white; border: none; border-radius: 4px; z-index: 100000; cursor: pointer;">Show Emoji Bar</button>

  <script>
    // Debug element to show what's happening
    const debugPanel = document.createElement('div');
    debugPanel.id = 'emoji-debug-panel';
    debugPanel.style.cssText = `
      position: fixed;
      top: 50px;
      right: 10px;
      background-color: rgba(255, 0, 0, 0.8);
      color: white;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 12px;
      max-width: 300px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 2000000;
      pointer-events: none;
    `;
    document.body.appendChild(debugPanel);

    function logDebug(message) {
      console.log(message);
      const logItem = document.createElement('div');
      logItem.textContent = message;
      logItem.style.borderBottom = '1px solid rgba(255,255,255,0.3)';
      logItem.style.paddingBottom = '3px';
      logItem.style.marginBottom = '3px';
      debugPanel.appendChild(logItem);
      
      // Keep only the last 10 messages
      while (debugPanel.children.length > 10) {
        debugPanel.removeChild(debugPanel.firstChild);
      }
    }

    // Function to check if an element is actually visible on screen
    function isVisible(element) {
      if (!element) return false;
      
      const style = window.getComputedStyle(element);
      
      // Check basic visibility properties
      if (style.display === 'none' || 
          style.visibility === 'hidden' || 
          style.opacity === '0') {
        return false;
      }
      
      // Check if element has size and is in viewport
      const rect = element.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) {
        return false;
      }
      
      // Check if element is covered by canvas or other element
      const elementAtPoint = document.elementFromPoint(
        rect.left + rect.width/2,
        rect.bottom - 10
      );
      
      if (elementAtPoint && !element.contains(elementAtPoint)) {
        // Something else is on top
        logDebug(`Element covered by: ${elementAtPoint.tagName}#${elementAtPoint.id || 'no-id'}`);
        return false;
      }
      
      return true;
    }

    // Create emoji bar directly in the DOM using the same approach as the poke leaderboard
    function createEmojiBar() {
      console.log('Creating emoji bar using poke leaderboard approach');
      
      // Check if we're on mobile
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                      (window.innerWidth <= 800 && window.innerHeight <= 900);
      
      // Create emoji bar container
      const emojiContainer = document.createElement('div');
      emojiContainer.id = 'emoji-bar-container';
      emojiContainer.style.position = 'fixed';
      emojiContainer.style.bottom = '20px';
      emojiContainer.style.left = '50%';
      emojiContainer.style.transform = 'translateX(-50%)';
      emojiContainer.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
      emojiContainer.style.color = 'white';
      emojiContainer.style.padding = '10px 15px';
      emojiContainer.style.borderRadius = '25px';
      emojiContainer.style.display = 'flex';
      emojiContainer.style.gap = '15px';
      emojiContainer.style.zIndex = '1001';
      emojiContainer.style.boxShadow = '0 3px 10px rgba(0, 0, 0, 0.5)';
      
      // Create emoji buttons
      const emojis = ['👋', '👍', '❤️', '😂', '🎉'];
      emojis.forEach(emoji => {
        const button = document.createElement('button');
        button.textContent = emoji;
        button.style.fontSize = '28px';
        button.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
        button.style.border = '2px solid rgba(255, 255, 255, 0.3)';
        button.style.borderRadius = '50%';
        button.style.width = '45px';
        button.style.height = '45px';
        button.style.cursor = 'pointer';
        button.style.color = 'white';
        button.style.display = 'flex';
        button.style.alignItems = 'center';
        button.style.justifyContent = 'center';
        button.style.transition = 'all 0.2s ease';
        
        // Add hover effects
        button.addEventListener('mouseenter', () => {
          button.style.transform = 'scale(1.1)';
          button.style.backgroundColor = 'rgba(0, 0, 0, 0.8)';
          button.style.borderColor = 'rgba(255, 255, 255, 0.5)';
        });
        
        button.addEventListener('mouseleave', () => {
          button.style.transform = 'scale(1)';
          button.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
          button.style.borderColor = 'rgba(255, 255, 255, 0.3)';
        });
        
        // Add click handler
        button.addEventListener('click', () => {
          showEmojiReaction(emoji);
        });
        
        emojiContainer.appendChild(button);
      });
      
      // Add the emoji bar to the document body (not inside ui-container)
      document.body.appendChild(emojiContainer);
      console.log('Emoji bar created and added to document.body');
      
      return emojiContainer;
    }
    
    // Function to show floating emoji animation
    function showEmojiReaction(emoji) {
      console.log('Emoji clicked:', emoji);
      
      // Create floating emoji element
      const element = document.createElement('div');
      element.textContent = emoji;
      element.style.position = 'fixed';
      element.style.fontSize = '60px';
      element.style.left = '50%';
      element.style.bottom = '40%';
      element.style.transform = 'translateX(-50%)';
      element.style.zIndex = '1002';
      element.style.textShadow = '0 2px 10px rgba(0, 0, 0, 0.7)';
      element.style.pointerEvents = 'none';
      
      // Add animation
      const animationName = 'float-up-' + Date.now();
      const style = document.createElement('style');
      style.textContent = `
        @keyframes ${animationName} {
          0% { opacity: 1; transform: translateX(-50%) translateY(0); }
          100% { opacity: 0; transform: translateX(-50%) translateY(-200px); }
        }
      `;
      document.head.appendChild(style);
      element.style.animation = `${animationName} 2s ease-out forwards`;
      
      // Add to document
      document.body.appendChild(element);
      
      // Remove after animation completes
      setTimeout(() => {
        if (document.body.contains(element)) {
          document.body.removeChild(element);
        }
        if (document.head.contains(style)) {
          document.head.removeChild(style);
        }
      }, 2000);
    }
    
    // Create the emoji bar when the page loads
    window.addEventListener('load', function() {
      console.log('Window loaded, creating emoji bar');
      createEmojiBar();
    });
    
    // Also try to create it immediately if the document is already loaded
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      console.log('Document already loaded, creating emoji bar immediately');
      createEmojiBar();
    }
    
    // Setup listener for the emergency button
    document.getElementById('show-emoji-bar').addEventListener('click', function() {
      console.log('Emergency button clicked');
      createEmojiBar();
      this.style.display = 'none';
    });
    
    // Create a backup timer to ensure the emoji bar is created
    setTimeout(function() {
      console.log('Backup timer: creating emoji bar');
      createEmojiBar();
    }, 3000);
  </script>
</body>
