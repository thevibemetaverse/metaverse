  </style>

<body>
  <div id="ui-container">
    <!-- UI elements will be added here -->
    <div class="emoji-reactions" style="position: fixed !important; bottom: 20px !important; z-index: 9999999 !important;">
      <button class="emoji-button" onclick="console.log('Emoji button clicked: 👋'); window.showEmojiReaction('👋')">👋</button>
      <button class="emoji-button" onclick="console.log('Emoji button clicked: 👍'); window.showEmojiReaction('👍')">👍</button>
      <button class="emoji-button" onclick="console.log('Emoji button clicked: ❤️'); window.showEmojiReaction('❤️')">❤️</button>
      <button class="emoji-button" onclick="console.log('Emoji button clicked: 😂'); window.showEmojiReaction('😂')">😂</button>
      <button class="emoji-button" onclick="console.log('Emoji button clicked: 🎉'); window.showEmojiReaction('🎉')">🎉</button>

  <button id="settings-button">⚙️</button>
  <div id="settings-panel">

    <div>

  <!-- Control instructions panel -->
  <div id="controls-help" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 10px; color: white; text-align: center; font-family: Arial, sans-serif; max-width: 400px; z-index: 1000;">
    <h2>Controls</h2>
    <div style="text-align: left; margin: 10px 0;">
      <p><strong>WASD or Arrow Keys:</strong> Move</p>

  </div>

  <!-- Debug panel -->
  <div id="debug-panel" style="position: fixed; bottom: 10px; right: 10px; width: 300px; max-height: 200px; overflow-y: auto; background-color: rgba(0, 0, 0, 0.8); color: #00ff00; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; z-index: 100000; display: none;">
    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
      <strong>Debug Panel</strong>
      <button id="clear-debug" style="background: none; border: none; color: #ff5722; cursor: pointer; font-size: 12px;">Clear</button>
    </div>
    <div id="debug-content"></div>
  </div>
  
  <!-- Debug controls -->
  <div style="position: fixed; top: 50px; right: 10px; display: flex; flex-direction: column; gap: 5px; z-index: 100000;">
    <button id="toggle-debug" style="background-color: #333; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">Show Debug</button>
    <button id="check-emoji-bar" style="background-color: #333; color: white; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer;">Check Emoji Bar</button>
  </div>

  <!-- Emergency Emoji Bar Button -->
  <button id="show-emoji-bar" style="position: fixed; top: 10px; left: 50%; transform: translateX(-50%); padding: 8px 16px; background-color: #0066ff; color: white; border: none; border-radius: 4px; z-index: 100000; cursor: pointer;">Show Emoji Bar</button>

  <!-- Debug button for emoji bar -->
  <button id="debug-emoji-bar" style="position: fixed; top: 10px; right: 10px; z-index: 9999; background-color: #ff5722; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer;">
    Test Emoji 🎉
  </button>

  <script>
    // Debug element to show what's happening
    const debugPanel = document.createElement('div');
    debugPanel.id = 'emoji-debug-panel';
    debugPanel.style.cssText = `
      position: fixed;
      top: 50px;
      right: 10px;
      background-color: rgba(255, 0, 0, 0.8);
      color: white;
      padding: 10px;
      border-radius: 5px;
      font-family: monospace;
      font-size: 12px;
      max-width: 300px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 2000000;
      pointer-events: none;
    `;
    document.body.appendChild(debugPanel);

    function logDebug(message) {
      console.log(message);
      const logItem = document.createElement('div');
      logItem.textContent = message;
      logItem.style.borderBottom = '1px solid rgba(255,255,255,0.3)';
      logItem.style.paddingBottom = '3px';
      logItem.style.marginBottom = '3px';
      debugPanel.appendChild(logItem);
      
      // Keep only the last 10 messages
      while (debugPanel.children.length > 10) {
        debugPanel.removeChild(debugPanel.firstChild);
      }
    }

    // Function to check if an element is actually visible on screen
    function isVisible(element) {
      if (!element) return false;
      
      const style = window.getComputedStyle(element);
      
      // Check basic visibility properties
      if (style.display === 'none' || 
          style.visibility === 'hidden' || 
          style.opacity === '0') {
        return false;
      }
      
      // Check if element has size and is in viewport
      const rect = element.getBoundingClientRect();
      if (rect.width === 0 || rect.height === 0) {
        return false;
      }
      
      // Check if element is covered by canvas or other element
      const elementAtPoint = document.elementFromPoint(
        rect.left + rect.width/2,
        rect.bottom - 10
      );
      
      if (elementAtPoint && !element.contains(elementAtPoint)) {
        // Something else is on top
        logDebug(`Element covered by: ${elementAtPoint.tagName}#${elementAtPoint.id || 'no-id'}`);
        return false;
      }
      
      return true;
    }

    // Function to show floating emoji animation
    // Create emoji bar directly in the DOM using the same approach as the poke leaderboard
    function createEmojiBar() {
      console.log('Creating emoji bar using poke leaderboard approach');
      
      // Check if we're on mobile
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                      (window.innerWidth <= 800 && window.innerHeight <= 900);
      
      // Create emoji bar container
      const emojiContainer = document.createElement('div');
      emojiContainer.id = 'emoji-bar-container';
      emojiContainer.style.position = 'fixed';
      emojiContainer.style.bottom = '20px';
      emojiContainer.style.left = '50%';
      emojiContainer.style.transform = 'translateX(-50%)';
      emojiContainer.style.backgroundColor = 'rgba(0, 0, 0, 0.7)';
      emojiContainer.style.color = 'white';
      emojiContainer.style.padding = '10px 15px';
      emojiContainer.style.borderRadius = '25px';
      emojiContainer.style.display = 'flex';
      emojiContainer.style.gap = '15px';
      emojiContainer.style.zIndex = '1001';
      emojiContainer.style.boxShadow = '0 3px 10px rgba(0, 0, 0, 0.5)';
      
      // Create emoji buttons
      const emojis = ['👋', '👍', '❤️', '😂', '🎉'];
      emojis.forEach(emoji => {
        const button = document.createElement('button');
        button.textContent = emoji;
        button.style.fontSize = '28px';
        button.style.backgroundColor = 'transparent';
        button.style.border = 'none';
        button.style.cursor = 'pointer';
        button.style.color = 'white';
        button.style.padding = '5px';
        
        // Add click handler
        button.addEventListener('click', () => {
          console.log('Emoji clicked:', emoji);
          
          // Use the window.showEmojiReaction function if available
          if (window.showEmojiReaction) {
            window.showEmojiReaction(emoji);
          } else {
            // Fallback to 2D animation
            // Create floating emoji element
            const element = document.createElement('div');
            element.textContent = emoji;
            element.style.position = 'fixed';
            element.style.fontSize = '60px';
            element.style.left = '50%';
            element.style.bottom = '40%';
            element.style.transform = 'translateX(-50%)';
            element.style.zIndex = '10000';
            element.style.pointerEvents = 'none';
            
            // Add animation
            element.style.animation = 'float-up 2s ease-out forwards';
            
            // Add to document
            document.body.appendChild(element);
            
            // Remove after animation completes
            setTimeout(() => {
              if (document.body.contains(element)) {
                document.body.removeChild(element);
              }
            }, 2000);
          }
        });
        
        emojiContainer.appendChild(button);
      });
      
      // Add animation style if it doesn't exist
      if (!document.querySelector('#emoji-animation')) {
        const style = document.createElement('style');
        style.id = 'emoji-animation';
        style.textContent = `
          @keyframes float-up {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-200px); }
          }
        `;
        document.head.appendChild(style);
      }
      
      // Add the emoji bar to the document body
      document.body.appendChild(emojiContainer);
      console.log('Emoji bar created and added to document.body');
      
      return emojiContainer;
    }
    
    // Function to show floating emoji animation
    function showEmojiReaction(emoji) {
      console.log('Emoji clicked:', emoji);
      
      // Only dispatch the event for the 3D implementation
      if (window.showEmojiReaction) {
        window.showEmojiReaction(emoji);
      } else {
        console.log('3D emoji implementation not available yet');
        
        // Dispatch event anyway in case it's handled elsewhere
        const event = new CustomEvent('emoji-reaction', { detail: { emoji } });
        document.dispatchEvent(event);
      }
    }
    
    // Create the emoji bar when the page loads
    window.addEventListener('load', function() {
      console.log('Window loaded, creating emoji bar');
      createEmojiBar();
    });
    
    // Also try to create it immediately if the document is already loaded
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      console.log('Document already loaded, creating emoji bar immediately');
      createEmojiBar();
    }
    
    // Setup listener for the emergency button
    document.getElementById('show-emoji-bar').addEventListener('click', function() {
      console.log('Emergency button clicked');
      createEmojiBar();
      this.style.display = 'none';
    });
    
    // Create a backup timer to ensure the emoji bar is created
    setTimeout(function() {
      console.log('Backup timer: creating emoji bar');
      createEmojiBar();
    }, 3000);

    // Add event listener for debug button
    document.getElementById('debug-emoji-bar').addEventListener('click', function() {
      console.log('Debug emoji button clicked');
      
      // Try to create a 3D emoji directly
      if (typeof window.showEmojiReaction === 'function') {
        console.log('Using 3D emoji reaction');
        window.showEmojiReaction('🎉');
      } else {
        console.log('3D emoji implementation not available yet, window.showEmojiReaction =', window.showEmojiReaction);
        
        // Dispatch custom event as fallback
        const event = new CustomEvent('emoji-reaction', { detail: { emoji: '🎉' } });
        document.dispatchEvent(event);
        console.log('Dispatched emoji-reaction event');
      }
    });

    // Debug panel functionality
    const debugPanel = document.getElementById('debug-panel');
    const debugContent = document.getElementById('debug-content');
    const toggleDebugBtn = document.getElementById('toggle-debug');
    const clearDebugBtn = document.getElementById('clear-debug');
    const checkEmojiBarBtn = document.getElementById('check-emoji-bar');
    
    // Override console.log to capture in debug panel
    const originalConsoleLog = console.log;
    console.log = function() {
      // Call the original console.log
      originalConsoleLog.apply(console, arguments);
      
      // Add to debug panel
      const message = Array.from(arguments).map(arg => 
        typeof arg === 'object' ? JSON.stringify(arg) : String(arg)
      ).join(' ');
      
      const logEntry = document.createElement('div');
      logEntry.textContent = `${new Date().toLocaleTimeString()}: ${message}`;
      logEntry.style.borderBottom = '1px solid #333';
      logEntry.style.paddingBottom = '3px';
      logEntry.style.marginBottom = '3px';
      debugContent.appendChild(logEntry);
      
      // Auto-scroll to bottom
      debugContent.scrollTop = debugContent.scrollHeight;
    };
    
    // Toggle debug panel
    toggleDebugBtn.addEventListener('click', function() {
      if (debugPanel.style.display === 'none') {
        debugPanel.style.display = 'block';
        toggleDebugBtn.textContent = 'Hide Debug';
      } else {
        debugPanel.style.display = 'none';
        toggleDebugBtn.textContent = 'Show Debug';
      }
    });
    
    // Clear debug panel
    clearDebugBtn.addEventListener('click', function() {
      debugContent.innerHTML = '';
    });
    
    // Check emoji bar status
    checkEmojiBarBtn.addEventListener('click', function() {
      const emojiBar = document.getElementById('emoji-bar-container');
      if (emojiBar) {
        console.log('Emoji bar exists with styles:', {
          position: emojiBar.style.position,
          bottom: emojiBar.style.bottom,
          left: emojiBar.style.left,
          zIndex: emojiBar.style.zIndex,
          display: emojiBar.style.display,
          visibility: emojiBar.style.visibility,
          opacity: emojiBar.style.opacity
        });
        
        // Check if it's visible in the viewport
        const rect = emojiBar.getBoundingClientRect();
        console.log('Emoji bar position in viewport:', {
          top: rect.top,
          left: rect.left,
          bottom: rect.bottom,
          right: rect.right,
          width: rect.width,
          height: rect.height,
          visible: (
            rect.top >= 0 &&
            rect.left >= 0 &&
            rect.bottom <= window.innerHeight &&
            rect.right <= window.innerWidth
          )
        });
      } else {
        console.log('Emoji bar does not exist in the DOM');
      }
      
      // Check for any elements with high z-index that might be covering it
      const highZElements = Array.from(document.querySelectorAll('*')).filter(el => {
        const style = window.getComputedStyle(el);
        const zIndex = parseInt(style.zIndex);
        return !isNaN(zIndex) && zIndex > 1000;
      });
      
      console.log(`Found ${highZElements.length} elements with high z-index`);
      highZElements.slice(0, 5).forEach(el => {
        console.log('High z-index element:', {
          tag: el.tagName,
          id: el.id,
          class: el.className,
          zIndex: window.getComputedStyle(el).zIndex
        });
      });
    });
    
    // Log initial debug info
    console.log('Debug panel initialized');
    console.log('Window dimensions:', window.innerWidth, 'x', window.innerHeight);
    console.log('User agent:', navigator.userAgent);
  </script>
