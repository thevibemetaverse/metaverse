<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metaverse</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        #username-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000; /* Ensure it appears above everything */
        }
        #username-form {
            background-color: #222;
            padding: 2rem;
            border-radius: 8px;
            text-align: center;
            color: white;
            max-width: 400px;
            width: 100%;
        }
        #username-form h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
        }
        #username-form input {
            padding: 0.75rem;
            width: 100%;
            border: none;
            border-radius: 4px;
            margin-bottom: 1rem;
            box-sizing: border-box;
            font-size: 1rem;
        }
        #username-form button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }
        #username-form button:hover {
            background-color: #3e8e41;
        }
    </style>
</head>
<body>
    <!-- Username overlay will be shown when no username is in URL params -->
    <div id="username-overlay" style="display: none;">
        <div id="username-form">
            <h2>Welcome to Metaverse</h2>
            <form id="submit-username">
                <input type="text" id="username-input" placeholder="Enter your username" required>
                <button type="submit">Start Exploring</button>
            </form>
        </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
