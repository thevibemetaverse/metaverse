<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- HTML Meta Tags -->
    <title>The Vibe Metaverse</title>
    <meta name="description" content="No headsets needed.">

    <!-- Facebook Meta Tags -->
    <meta property="og:url" content="https://thevibemetaverse.com">
    <meta property="og:type" content="website">
    <meta property="og:title" content="The Vibe Metaverse">
    <meta property="og:description" content="No headsets needed.">
    <meta property="og:image" content="https://opengraph.b-cdn.net/production/images/ae807bd1-1b8b-45ba-a156-34ee3a1ef4ce.jpg?token=xgOsa9h-Zlw8OV5aMbuGId_iBiNmF08CaoQ9fLvLvIs&height=630&width=1200&expires=33279467885">

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta property="twitter:domain" content="thevibemetaverse.com">
    <meta property="twitter:url" content="https://thevibemetaverse.com">
    <meta name="twitter:title" content="The Vibe Metaverse">
    <meta name="twitter:description" content="No headsets needed.">
    <meta name="twitter:image" content="https://opengraph.b-cdn.net/production/images/ae807bd1-1b8b-45ba-a156-34ee3a1ef4ce.jpg?token=xgOsa9h-Zlw8OV5aMbuGId_iBiNmF08CaoQ9fLvLvIs&height=630&width=1200&expires=33279467885">

    <!-- Meta Tags Generated via https://www.opengraph.xyz -->
    
    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png">
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
    <link rel="manifest" href="/manifest.json">
    
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        #username-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                        url('/assets/images/splash.jpeg') center center no-repeat;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000; /* Ensure it appears above everything */
        }
        #username-form {
            background-color: rgba(34, 34, 34, 0.9);
            padding: 2rem;
            border-radius: 16px;
            text-align: center;
            color: white;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5),
                        0 16px 48px rgba(0, 0, 0, 0.3),
                        0 0 2px rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 0 8px;
            box-sizing: border-box;
        }
        #username-form h2 {
            margin-top: 0;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            color: #4CAF50;
        }
        #username-form input {
            padding: 0.75rem;
            width: 100%;
            border: none;
            border-radius: 4px;
            margin-bottom: 1.5rem;
            box-sizing: border-box;
            font-size: 1rem;
            outline: none;
        }
        #username-form button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
            font-weight: bold;
            min-width: 150px;
        }
        #username-form button:hover {
            background-color: #3e8e41;
        }
        .hidden {
            display: none !important;
        }
        @media (max-width: 480px) {
            #username-form {
                padding: 1.5rem;
                margin: 0 8px;
                max-width: calc(100% - 16px);
            }
            #username-form h2 {
                font-size: 1.5rem;
            }
            #username-form input {
                font-size: 16px; /* Prevents zoom on mobile */
            }
        }
    </style>
</head>
<body>
    <!-- Username modal -->
    <div id="username-modal">
        <div id="username-form">
            <h2>Welcome to the <br/>Vibe Metaverse</h2>
            <form id="submit-username">
                <input type="text" id="username-input" placeholder="Enter a display name" value="metaverse-explorer" required>
                <button type="submit">Start Exploring</button>
            </form>
        </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
